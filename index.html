<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAMOCOIN - La Moneda del Futuro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 450px; width: 100%; background: #161b26; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid #242c3d; }
        .logo { font-size: 3rem; font-weight: bold; background: linear-gradient(45deg, #1d4ed8, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .tagline { color: #9ca3af; margin-bottom: 30px; }
        .info-box { background: #1f2736; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.95rem; }
        .btn-world { background-color: #ffffff; color: #000000; border: none; padding: 15px 25px; font-size: 1rem; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FAMOCOIN</div>
        <p class="tagline">Una moneda digital para personas reales.</p>
        <div class="info-box">
            <p><strong>¡Bienvenidos al lanzamiento!</strong></p>
            <p style="margin-top: 8px;">Verifica tu identidad con World ID y reclama tus primeros FAMOCOINS gratis.</p>
        </div>
        <button class="btn-world" onclick="alert('¡Próximamente conexión con World ID!')">
            Verificar con World ID
        </button>
    </div>
</body>
</html>
